<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Ad Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- Particle canvas -->
  <canvas id="particleCanvas"></canvas>
  <div class="noise-overlay"></div>

  <!-- ===== HERO ===== -->
  <section class="hero" id="hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <header class="topbar">
      <span class="brand-tag" id="brandTag"></span>
      <nav class="topnav" id="topNav"></nav>
    </header>

    <div class="hero-content">

      <!-- LEFT -->
      <div class="hero-left" id="heroLeft">
        <div class="eyebrow-line">
          <span class="eyebrow-dot"></span>
          <span class="eyebrow-text" id="productBadge"></span>
        </div>
        <h1 class="hero-title">
          <span class="title-line line-1" id="titleLine1"></span>
          <span class="title-line line-2"><em id="titleLine2"></em></span>
          <span class="title-line line-3" id="titleLine3"></span>
        </h1>
        <p class="hero-sub" id="heroDesc"></p>
        <div class="cta-group">
          <button class="btn-primary" id="ctaBtn">
            <span class="btn-text" id="ctaPrimaryText"></span>
            <span class="btn-shine"></span>
          </button>
          <button class="btn-ghost" id="ctaGhostBtn"></button>
        </div>
        <div class="swatches" id="swatches">
          <span class="swatch-label">SELECT SHADE</span>
          <div class="swatch-row" id="swatchRow"></div>
        </div>
      </div>

      <!-- CENTER: 3D tube (structural — never changes) -->
      <div class="hero-center" id="heroCenter">
        <div class="product-scene" id="productScene">
          <div class="product-wrapper" id="productWrapper">
            <div class="shadow-plane"></div>
            <div class="tube-container" id="tubeContainer">
              <div class="tube">
                <div class="tube-cap"></div>
                <div class="tube-neck"></div>
                <div class="tube-body" id="tubeBody">
                  <div class="tube-label">
                    <div class="label-brand" id="labelBrand"></div>
                    <div class="label-name"  id="labelName"></div>
                    <div class="label-sub"   id="labelSub"></div>
                    <div class="label-stripe"></div>
                  </div>
                  <div class="tube-shine-strip"></div>
                  <div class="tube-shine-strip-2"></div>
                </div>
                <div class="tube-tip"><div class="tip-gloss"></div></div>
              </div>
              <div class="orbit orbit-1"><div class="sparkle s1">✦</div></div>
              <div class="orbit orbit-2"><div class="sparkle s2">✦</div></div>
              <div class="orbit orbit-3"><div class="sparkle s3">★</div></div>
              <div class="orbit orbit-4"><div class="sparkle s4">✦</div></div>
              <div class="gloss-drop drop-1"></div>
              <div class="gloss-drop drop-2"></div>
              <div class="gloss-drop drop-3"></div>
            </div>
            <div class="halo-ring halo-1"></div>
            <div class="halo-ring halo-2"></div>
            <div class="halo-ring halo-3"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="hero-right" id="heroRight">
        <div id="statCards"></div>
        <div class="ingredients-tag">
          <span class="ing-label">KEY INGREDIENTS</span>
          <div class="ing-pills" id="ingPills"></div>
        </div>
        <div class="rating-block" id="ratingBlock"></div>
      </div>

    </div>

    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </section>

  <!-- ===== FEATURES ===== -->
  <section class="features" id="features">
    <div class="feat-bg-text" id="featBgText"></div>
    <div class="feat-grid" id="featGrid"></div>
  </section>

  <!-- ===== SHADES SECTION ===== -->
  <section class="shades-section" id="shadesSection">
    <div class="shades-header">
      <p class="shades-eyebrow" id="shadesEyebrow"></p>
      <h2 class="shades-title" id="shadesTitle"></h2>
    </div>
    <div class="shades-carousel" id="shadesCarousel"></div>
  </section>

  <!-- ===== FINAL CTA ===== -->
  <section class="final-cta" id="finalCta">
    <div class="final-blobs">
      <div class="fb fb-1"></div>
      <div class="fb fb-2"></div>
    </div>
    <div class="final-content">
      <p class="final-eyebrow" id="finalEyebrow"></p>
      <h2 class="final-headline" id="finalHeadline"></h2>
      <p class="final-body"     id="finalBody"></p>
      <button class="btn-primary btn-large" id="finalCtaBtn">
        <span class="btn-text" id="finalCtaText"></span>
        <span class="btn-shine"></span>
      </button>
    </div>
    <div class="final-price-tag" id="priceTag"></div>
    <footer class="footer-bar" id="footerBar"></footer>
  </section>

  <!-- config.js MUST load before script.js -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
